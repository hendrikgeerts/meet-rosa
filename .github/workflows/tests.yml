name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Test-only deps
          pip install pytest pytest-cov respx

      - name: Run pytest
        env:
          PYTHONPATH: src
          # Prevent tests from accidentally opening the wizard on
          # the CI runner's default port.
          ROSA_WIZARD_DISABLED: "1"
        run: |
          pytest tests/ -q --no-header

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      # Ruff findings are informational for MVP — many are cosmetic
      # (unused vars in test-fixtures, deep exception-chains, etc).
      # `continue-on-error` posts a warning in the PR without blocking
      # the merge. Tighten this when the codebase is stable.
      - run: ruff check src/ tests/
        continue-on-error: true
