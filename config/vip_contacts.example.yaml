# VIP-lijst — afzenders/contacten waarvan mail/iMessage minimaal 'internal' krijgt.
# Wordt door classifier en redactor gelezen om consistente pseudonymisering te garanderen
# (bv. eenzelfde persoon krijgt steeds [PERSON_001] binnen een sessie).
#
# Kopieer naar vip_contacts.yaml voor je eigen lijst — de .yaml staat in .gitignore.

people:
