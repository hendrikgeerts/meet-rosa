  # - code: "DST-INC-2026-04"
  #   name: "Incident-onderzoek april 2026"

# Safe-terms: strings die NIET geredacteerd mogen worden, ook al markeert
# spaCy NER ze als LOC/GPE/PERSON. Voor jouw woonplaats/kantoorplaats die
# context-relevant blijft in briefings (weather-context, travel-alerts).
# Anders zou "Het wordt morgen 21°C in your-home-city" terugkomen als
# "Het wordt morgen 21°C in [ADDRESS_001]" — of erger: hallucinated als
# "Hasselt".
safe_terms:
